<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FF MTG Tracker</title>
<style>
  :root {
    --bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--owned:#1a3a1a;--owned-border:#2d6a2d;
    --accent:#e2b96f;--text:#e8e8e8;--muted:#8899aa;--border:#2a3a5a;--green:#2ecc71;
    --sC:#95a5a6;--sW:#d4af37;--sU:#4a90d9;--sB:#9b59b6;--sR:#e74c3c;
    --sG:#27ae60;--sM:#e67e22;--sA:#7f8c8d;--sL:#16a085;--sT:#8e44ad;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

  /* TABS */
  .tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
  .tab-btn{flex:1;padding:11px 4px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* HEADER */
  .header{background:var(--surface);padding:10px 14px 8px;border-bottom:1px solid var(--border);position:sticky;top:42px;z-index:100}
  .logo{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .logo span{display:block;font-size:9px;color:var(--muted);font-weight:400}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
  .stat{background:var(--card);border-radius:8px;padding:5px 3px;text-align:center}
  .stat-n{font-size:16px;font-weight:700;line-height:1}
  .stat-n.g{color:var(--green)} .stat-n.a{color:var(--accent)}
  .stat-l{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
  .progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:99px;transition:width .4s}

  /* FILTERS */
  .filters{padding:8px 12px;display:flex;flex-direction:column;gap:7px;background:var(--surface);border-bottom:1px solid var(--border)}
  .search-wrap{position:relative}
  .search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px 7px 32px;font-size:14px;outline:none}
  .search-wrap input::placeholder{color:var(--muted)}
  .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
  .filter-row{display:flex;gap:6px}
  .filter-row select{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 7px;font-size:13px;outline:none}
  .miss-btn{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;font-weight:600}
  .miss-btn.on{background:var(--owned);color:var(--green);border-color:var(--owned-border)}

  /* LIST */
  .page{display:none} .page.active{display:block}
  .list{padding:6px 10px 80px;display:flex;flex-direction:column;gap:4px}
  .section-head{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:8px 4px 3px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--border);margin-bottom:2px}
  .card-row{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 9px;cursor:pointer;user-select:none}
  .card-row.owned{background:var(--owned);border-color:var(--owned-border)}
  .card-row:active{opacity:.75}
  .cb-wrap{width:21px;height:21px;border-radius:50%;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
  .card-row.owned .cb-wrap{background:var(--green);border-color:var(--green)}
  .cb-check{color:#fff;font-size:12px;line-height:1;display:none}
  .card-row.owned .cb-check{display:block}
  .num{font-size:11px;color:var(--muted);min-width:32px;flex-shrink:0;font-variant-numeric:tabular-nums;font-weight:600}
  .card-row.owned .num{color:var(--green)}
  .card-name{flex:1;min-width:0;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qty-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0}
  .qb{width:23px;height:23px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:300}
  .qb:active{opacity:.6}
  .qv{font-size:12px;font-weight:700;min-width:14px;text-align:center;color:var(--accent)}
  .empty{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:14px}

  /* POPUP */
  .popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center;padding:20px}
  .popup-overlay.show{display:flex}
  .popup-box{background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:18px 20px;max-width:320px;width:100%}
  .popup-num{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.08em;margin-bottom:5px}
  .popup-name{font-size:17px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:12px}
  .popup-sec{font-size:11px;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
  .popup-close{width:100%;padding:9px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer}

  /* SECTION COLOURS */
  .sc-C{color:var(--sC)} .sc-W{color:var(--sW)} .sc-U{color:var(--sU)} .sc-B{color:var(--sB)}
  .sc-R{color:var(--sR)} .sc-G{color:var(--sG)} .sc-M{color:var(--sM)} .sc-A{color:var(--sA)}
  .sc-L{color:var(--sL)} .sc-T{color:var(--sT)}
</style>
</head>

// ══════════════════════════════════════
// STATE & STORAGE
// ══════════════════════════════════════
const CARDS=[FIN,FIC];
const KEYS=["ff_fin_v3","ff_fic_v1"];
const owned=[{},{}];
const showMissing=[false,false];
let activeTab=0;

// API endpoint that reads/writes the shared collection (Vercel function + Upstash Redis)
const API="/api/collection";

async function loadAll(){
  // 1) Show the local cache immediately so the app is instant and works offline.
  for(let t=0;t<2;t++){
    try{const d=localStorage.getItem(KEYS[t]);if(d)Object.assign(owned[t],JSON.parse(d));}catch(e){}
  }
  render(0);render(1);
  // 2) Then pull the shared copy from the server. The server is the source of truth,
  //    so once it answers we adopt its data and refresh the local cache.
  try{
    const r=await fetch(API,{cache:"no-store"});
    if(r.ok){
      const data=await r.json();
      owned[0]=data.fin||{};
      owned[1]=data.fic||{};
      try{localStorage.setItem(KEYS[0],JSON.stringify(owned[0]));}catch(e){}
      try{localStorage.setItem(KEYS[1],JSON.stringify(owned[1]));}catch(e){}
      render(0);render(1);
    }
  }catch(e){/* offline or API unreachable: keep showing the local cache */}
}

// Every change writes locally at once, then pushes the whole collection to the
// server (debounced, so rapid taps result in a single network write).
let syncTimer=null;
function save(t){
  try{localStorage.setItem(KEYS[t],JSON.stringify(owned[t]));}catch(e){}
  clearTimeout(syncTimer);
  syncTimer=setTimeout(syncToServer,600);
}
function syncToServer(){
  try{
    fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({fin:owned[0],fic:owned[1]})
    }).catch(()=>{});
  }catch(e){}
}

function toggleRow(t,idx){
  const k=CARDS[t][idx][0];
  if(owned[t][k])delete owned[t][k];else owned[t][k]=1;
  save(t);render(t);
}
function changeQty(t,idx,d,e){
  e.stopPropagation();
  const k=CARDS[t][idx][0];
  const nv=Math.max(0,(owned[t][k]||0)+d);
  if(nv===0)delete owned[t][k];else owned[t][k]=nv;
  save(t);render(t);
}
function toggleMissing(t){
  showMissing[t]=!showMissing[t];
  document.getElementById((t?'fic':'fin')+'-miss-btn').classList.toggle('on',showMissing[t]);
  render(t);
}
function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===t));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===t));
  var fs=document.getElementById('fin-stats'); if(fs) fs.style.display=t===0?'grid':'none';
  var fc=document.getElementById('fic-stats'); if(fc) fc.style.display=t===1?'grid':'none';
}

function filteredCards(t){
  const pre=t?'fic':'fin';
  const q=document.getElementById(pre+'-search').value.toLowerCase().trim();
  const fs=document.getElementById(pre+'-fsec').value;
  const res=[];
  CARDS[t].forEach((c,i)=>{
    if(fs&&c[1]!==fs)return;
    if(q){
      const num='#'+String(c[0]).padStart(3,'0');
      if(!c[2].toLowerCase().includes(q)&&!num.includes(q)&&!String(c[0]).toLowerCase().includes(q))return;
    }
    if(showMissing[t]&&owned[t][c[0]])return;
    res.push({c,i});
  });
  return res;
}

function render(t){
  const pre=t?'fic':'fin';
  const total=CARDS[t].length;
  const have=Object.keys(owned[t]).length;
  const pct=Math.round(have/total*100);
  document.getElementById(pre+'-owned').textContent=have;
  document.getElementById(pre+'-miss').textContent=total-have;
  document.getElementById(pre+'-pct').textContent=pct+'%';
  document.getElementById(pre+'-total').textContent=total;
  document.getElementById(pre+'-prog').style.width=pct+'%';

  const cards=filteredCards(t);
  const el=document.getElementById(pre+'-list');
  if(!cards.length){el.innerHTML='<div class="empty">No cards match your filters</div>';return;}
  let html='';let lastSec='';
  for(const {c,i} of cards){
    const k=c[0];
    const qty=owned[t][k]||0;
    const isOwned=qty>0;
    const num=typeof k==='string'?k:'#'+String(k).padStart(3,'0');
    if(c[1]!==lastSec){lastSec=c[1];html+=`<div class="section-head sc-${c[1]}">${SN[c[1]]||c[1]}</div>`;}
    html+=`<div class="card-row${isOwned?' owned':''}" onclick="toggleRow(${t},${i})" onmousedown="startPressIdx(${t},${i})" onmouseup="endPress()" onmouseleave="endPress()" ontouchstart="startPressIdx(${t},${i})" ontouchend="endPress()" ontouchcancel="endPress()">
      <div class="cb-wrap"><span class="cb-check">✓</span></div>
      <span class="num">${num}</span>
      <span class="card-name">${num} · ${c[2]}</span>
      <div class="qty-ctrl" onclick="event.stopPropagation()">
        <button class="qb" onclick="changeQty(${t},${i},-1,event)">−</button>
        <span class="qv">${qty}</span>
        <button class="qb" onclick="changeQty(${t},${i},1,event)">+</button>
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

// LONG PRESS POPUP
let pressTimer=null;
function startPressIdx(t,idx){
  pressTimer=setTimeout(()=>{
    const c=CARDS[t][idx];
    const num=typeof c[0]==='string'?c[0]:'#'+String(c[0]).padStart(3,'0');
    document.getElementById('popupNum').textContent=num;
    document.getElementById('popupName').textContent=c[2];
    document.getElementById('popupSec').textContent=SN[c[1]]||c[1];
    document.getElementById('popup').classList.add('show');
  },500);
}
function endPress(){clearTimeout(pressTimer);}
function closePopup(){document.getElementById('popup').classList.remove('show');}

document.addEventListener("DOMContentLoaded",function(){loadAll();});

</script>
